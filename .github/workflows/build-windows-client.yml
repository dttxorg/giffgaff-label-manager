name: Build Windows Client

on:
  push:
    branches: [main]
    paths:
      - 'desktop-client/**'
      - '.github/workflows/build-windows-client.yml'
  workflow_dispatch:

jobs:
  build-windows-client:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: desktop-client
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create venv with selected Python
        shell: pwsh
        run: python -m venv .venv

      - name: Build Windows executable
        shell: pwsh
        run: .\build_windows.ps1

      - name: Upload Windows client artifact
        uses: actions/upload-artifact@v4
        with:
          name: GiffgaffActivationClient-windows
          path: desktop-client/dist/GiffgaffActivationClient
          if-no-files-found: error
