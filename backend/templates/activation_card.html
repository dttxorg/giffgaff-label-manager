<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="robots" content="noindex, nofollow, noarchive">
<title>giffgaff 激活教程</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 24px 16px; min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
      "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: #f6f7f9; color: #1a1a1a;
    display: flex; flex-direction: column; align-items: center;
  }
  .card {
    width: 100%; max-width: 480px; background: #fff;
    border-radius: 16px; padding: 28px 20px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }
  .label {
    font-size: 13px; color: #6b7280; margin: 0 0 12px;
    letter-spacing: 0.02em; font-weight: 600;
  }
  .tutorial-row {
    display: flex; align-items: center; gap: 8px; padding: 10px 0;
  }
  .tutorial-label {
    flex: 0 0 56px; font-size: 14px; color: #6b7280; font-weight: 600;
  }
  .tutorial-val {
    flex: 1; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    font-size: 14px; background: #f3f4f6; padding: 10px 12px;
    border-radius: 8px; word-break: break-all; user-select: all; color: #111827;
  }
  .copy-btn {
    flex: 0 0 auto; height: 36px; border: 0; border-radius: 8px; cursor: pointer;
    font-size: 13px; font-weight: 600; color: #fff; background: #2563eb;
    padding: 0 14px; transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .copy-btn:active { background: #1d4ed8; }
  .copy-btn.copied { background: #16a34a; }
  .divider { height: 1px; background: #e5e7eb; margin: 20px 0 14px; }
  .hint { font-size: 14px; line-height: 1.7; color: #374151; }
  .hint p { margin: 0 0 12px; }
  .hint p:last-child { margin-bottom: 0; }
  .hint h3, .hint h4 { margin: 18px 0 10px; line-height: 1.3; color: #111827; }
  .hint h3 { font-size: 17px; }
  .hint h4 { font-size: 15px; }
  .hint code { background: #f3f4f6; padding: 1px 6px; border-radius: 4px; font-size: 13px; }
  .hint a { color: #2563eb; }
  .empty { color: #6b7280; font-style: italic; }
  .footer { margin-top: 24px; font-size: 12px; color: #9ca3af; text-align: center; }
  @media (prefers-color-scheme: dark) {
    body { background: #111827; color: #e5e7eb; }
    .card { background: #1f2937; box-shadow: 0 2px 12px rgba(0,0,0,0.3); }
    .label, .empty, .tutorial-label { color: #9ca3af; }
    .tutorial-val { background: #111827; color: #f3f4f6; }
    .divider { background: #374151; }
    .hint { color: #d1d5db; }
    .hint h3, .hint h4 { color: #f3f4f6; }
    .hint code { background: #111827; color: #e5e7eb; }
  }
</style>
</head>
<body>
  <main class="card" role="main">
    <p class="label">giffgaff 激活教程</p>
    <div class="tutorial-row">
      <span class="tutorial-label">🔗 教程</span>
      <code id="tutorial-url" data-url="__TUTORIAL_URL__" class="tutorial-val">__TUTORIAL_URL_DISPLAY__</code>
      <button class="copy-btn" type="button" onclick="copyTutorialUrl()" id="tutorial-copy-btn">复制</button>
    </div>

    <div class="divider"></div>
    <div class="hint" id="hint">
      <!--email_off-->
      __HINT_HTML__
      <!--/email_off-->
    </div>
  </main>
  <p class="footer">请复制教程地址后在浏览器中打开。</p>

<script>
function copyTutorialUrl() {
  const el = document.getElementById('tutorial-url');
  const value = el ? (el.dataset.url || el.textContent.trim()) : '';
  if (!value) {
    alert('教程地址为空');
    return;
  }
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(value).then(showCopied).catch(() => fallbackCopy(value));
  } else {
    fallbackCopy(value);
  }
}
function fallbackCopy(text) {
  try {
    const ta = document.createElement('textarea');
    ta.value = text; ta.setAttribute('readonly', '');
    ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select(); ta.setSelectionRange(0, 99999);
    document.execCommand('copy');
    document.body.removeChild(ta);
    showCopied();
  } catch (e) { alert('复制失败，请长按手动复制'); }
}
function showCopied() {
  const btn = document.getElementById('tutorial-copy-btn');
  if (!btn) return;
  btn.classList.add('copied');
  btn.textContent = '已复制';
  setTimeout(() => { btn.classList.remove('copied'); btn.textContent = '复制'; }, 1400);
}
</script>
</body>
</html>
