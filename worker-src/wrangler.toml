name = "public-card"
main = "src/index.js"
compatibility_date = "2025-01-01"

# API_BASE 默认值。生产环境建议通过 Cloudflare Dashboard →
# Settings → Environment variables 设置 API_BASE，那里设的值会覆盖下面的默认值。
# 也就是说，wrangler.toml 改了不会影响 Cloudflare Dashboard 已经配的 API_BASE。
# 本地调试（wrangler dev）时直接修改下面这一行即可。
[vars]
API_BASE = "https://label.example.com"
